<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reports — Centro de Mando</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e2019;
    --surface: #152e23;
    --surface2: #1d3d2f;
    --border: rgba(100,200,155,0.12);
    --border2: rgba(100,200,155,0.22);
    --text: #e0f5ea;
    --text2: #7fbfa0;
    --text3: #4a8068;
    --accent: #4db882;
    --accent-dim: rgba(77,184,130,0.18);

    --alta: #ff6b6b;
    --alta-bg: rgba(255,107,107,0.12);
    --media: #ffc542;
    --media-bg: rgba(255,197,66,0.12);
    --baja: #4db882;
    --baja-bg: rgba(77,184,130,0.12);

    --bug: #ff8c42;
    --bug-bg: rgba(255,140,66,0.12);
    --incidente: #ff6b6b;
    --incidente-bg: rgba(255,107,107,0.12);
    --tarea: #4db882;
    --tarea-bg: rgba(77,184,130,0.14);
    --otro: #7fbfa0;
    --otro-bg: rgba(127,191,160,0.12);

    --nuevo: #2563eb;
    --nuevo-bg: rgba(37,99,235,0.15);
    --en_proceso: #ea580c;
    --en_proceso-bg: rgba(234,88,12,0.12);
    --resuelto: #dc2626;
    --resuelto-bg: rgba(220,38,38,0.12);
    --visto: #0891b2;
    --visto-bg: rgba(8,145,178,0.15);
    --en_revision: #7c3aed;
    --en_revision-bg: rgba(124,58,237,0.15);
  }

  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
  }

  /* Sidebar */
  .sidebar {
    width: 220px;
    min-height: 100vh;
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 24px 16px;
    display: flex;
    flex-direction: column;
    gap: 32px;
    flex-shrink: 0;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 4px;
  }

  .logo-icon {
    width: 28px;
    height: 28px;
    background: #285A48;
    border: 1px solid rgba(77,184,130,0.3);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo-icon svg { width: 16px; height: 16px; fill: white; }

  .logo-text {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.05em;
    color: var(--text);
  }

  .logo-sub {
    font-size: 10px;
    color: var(--text3);
    font-family: 'IBM Plex Mono', monospace;
    letter-spacing: 0.08em;
  }

  .nav-section label {
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--text3);
    text-transform: uppercase;
    padding: 0 8px;
    margin-bottom: 6px;
    display: block;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 8px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    color: var(--text2);
    transition: all 0.15s;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
  }

  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { background: var(--accent-dim); color: var(--accent); }

  .nav-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .badge {
    margin-left: auto;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 10px;
    background: var(--surface2);
    color: var(--text2);
  }

  .nav-item.active .badge { background: var(--accent-dim); color: var(--accent); }

  .sync-btn {
    margin-top: auto;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    border-radius: 6px;
    border: 1px solid var(--border2);
    background: none;
    color: var(--text2);
    font-size: 12px;
    font-family: 'IBM Plex Sans', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
    width: 100%;
  }

  .sync-btn:hover { background: var(--surface2); color: var(--text); border-color: var(--border2); }

  /* Main */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .topbar {
    padding: 16px 28px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .topbar h1 {
    font-size: 15px;
    font-weight: 500;
    flex: 1;
    color: var(--text);
  }

  .filter-group {
    display: flex;
    gap: 6px;
  }

  .filter-chip {
    padding: 5px 11px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: none;
    color: var(--text2);
    font-size: 12px;
    font-family: 'IBM Plex Sans', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
  }

  .filter-chip:hover { border-color: var(--border2); color: var(--text); }
  .filter-chip.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

  /* Stats */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: var(--border);
    border-bottom: 1px solid var(--border);
  }

  .stat-cell {
    background: var(--surface);
    padding: 14px 20px;
  }

  .stat-label { font-size: 11px; color: var(--text3); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 4px; }
  .stat-value { font-family: 'IBM Plex Mono', monospace; font-size: 22px; font-weight: 500; color: var(--text); }
  .stat-value.accent { color: var(--accent); }
  .stat-value.alta { color: var(--alta); }

  /* Content area */
  .content {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* Report list */
  .report-list {
    width: 400px;
    border-right: 1px solid var(--border);
    overflow-y: auto;
    flex-shrink: 0;
  }

  .report-list::-webkit-scrollbar { width: 4px; }
  .report-list::-webkit-scrollbar-track { background: transparent; }
  .report-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .list-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    color: var(--text3);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 1;
  }

  .report-card {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.1s;
    position: relative;
  }

  .report-card:hover { background: var(--surface); }
  .report-card.selected { background: var(--surface2); border-left: 2px solid var(--accent); }

  .report-card-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }

  .pill {
    font-size: 10px;
    font-family: 'IBM Plex Mono', monospace;
    padding: 2px 7px;
    border-radius: 3px;
    font-weight: 500;
    letter-spacing: 0.04em;
  }

  .pill-alta { background: var(--alta-bg); color: var(--alta); }
  .pill-media { background: var(--media-bg); color: var(--media); }
  .pill-baja { background: var(--baja-bg); color: var(--baja); }

  .pill-bug { background: var(--bug-bg); color: var(--bug); }
  .pill-incidente { background: var(--incidente-bg); color: var(--incidente); }
  .pill-tarea { background: var(--tarea-bg); color: var(--tarea); }
  .pill-otro { background: var(--otro-bg); color: var(--otro); }

  .pill-nuevo      { background: #2563eb; color: #fff; }
  .pill-visto       { background: #0891b2; color: #fff; }
  .pill-en_revision { background: #7c3aed; color: #fff; }
  .pill-en_proceso  { background: #ea580c; color: #fff; }
  .pill-resuelto   { background: #dc2626; color: #000; }

  .report-card-time { font-size: 11px; color: var(--text3); margin-left: auto; font-family: 'IBM Plex Mono', monospace; }

  .report-card-summary { font-size: 13px; color: var(--text); line-height: 1.4; margin-bottom: 6px; }
  .report-card-user { font-size: 11px; color: var(--text3); }

  .unread-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
  }

  /* Detail panel */
  .detail-panel {
    flex: 1;
    overflow-y: auto;
    padding: 24px 28px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .detail-panel::-webkit-scrollbar { width: 4px; }
  .detail-panel::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    color: var(--text3);
  }

  .empty-icon { font-size: 40px; opacity: 0.3; }
  .empty-state p { font-size: 13px; }

  .detail-header {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    justify-content: space-between;
  }

  .detail-title { font-size: 16px; font-weight: 500; color: var(--text); line-height: 1.4; flex: 1; }

  .detail-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    align-items: center;
  }

  .section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .section-title {
    padding: 10px 14px;
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .section-body { padding: 14px; }

  .raw-msg {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--text2);
    line-height: 1.7;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .key-points { list-style: none; display: flex; flex-direction: column; gap: 8px; }

  .key-point {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    font-size: 13px;
    color: var(--text);
    line-height: 1.5;
  }

  .kp-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
    margin-top: 7px;
  }

  .lf-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .lf-field { display: flex; flex-direction: column; gap: 2px; }
  .lf-label { font-size: 10px; color: var(--text3); letter-spacing: 0.06em; text-transform: uppercase; }
  .lf-value { font-size: 12px; color: var(--text); font-family: 'IBM Plex Mono', monospace; word-break: break-all; }

  .status-actions {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .status-btn-group {
    display: inline-flex;
    border-radius: 5px;
    overflow: hidden;
    border: 2px solid transparent;
    transition: opacity 0.15s, border-color 0.15s;
    opacity: 0.45;
  }

  .status-btn-group:hover { opacity: 0.75; }
  .status-btn-group.current { opacity: 1; border-color: rgba(255,255,255,0.45); }

  .status-btn {
    padding: 6px 13px;
    border: none;
    font-size: 12px;
    font-family: 'IBM Plex Sans', sans-serif;
    cursor: pointer;
  }

  .status-notify {
    padding: 6px 8px;
    border: none;
    border-left: 1px solid rgba(255,255,255,0.2);
    cursor: pointer;
    display: flex;
    align-items: center;
    transition: background 0.12s;
  }

  .status-notify:hover { background: rgba(255,255,255,0.15); }

  .status-btn-nuevo       { background: #2563eb; color: #fff; }
  .status-btn-visto       { background: #0891b2; color: #fff; }
  .status-btn-en_revision { background: #7c3aed; color: #fff; }
  .status-btn-en_proceso  { background: #ea580c; color: #fff; }
  .status-btn-resuelto    { background: #dc2626; color: #000; }

  .notes-area {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 13px;
    padding: 10px 12px;
    resize: vertical;
    min-height: 80px;
    outline: none;
    line-height: 1.6;
  }

  .notes-area:focus { border-color: var(--accent); }

  .save-btn {
    padding: 6px 16px;
    border-radius: 5px;
    background: var(--accent);
    border: none;
    color: white;
    font-size: 12px;
    font-family: 'IBM Plex Sans', sans-serif;
    cursor: pointer;
    opacity: 0.9;
    transition: opacity 0.15s;
  }

  .save-btn:hover { opacity: 1; }

  .notify-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    border-radius: 5px;
    border: 1px solid var(--border2);
    background: none;
    color: var(--text2);
    font-size: 12px;
    font-family: 'IBM Plex Sans', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
  }

  .notify-btn:hover { background: var(--surface2); color: var(--text); }
  .notify-btn:disabled { opacity: 0.5; cursor: default; }

  .ts-label {
    font-size: 11px;
    color: var(--text3);
    font-family: 'IBM Plex Mono', monospace;
  }

  .no-reports {
    padding: 32px 16px;
    text-align: center;
    color: var(--text3);
    font-size: 13px;
  }

  .spinning { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .resolution-time-input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    padding: 7px 10px;
    outline: none;
    width: 80px;
    transition: border-color 0.15s;
  }
  .resolution-time-input:focus { border-color: var(--accent); }

  .resolution-time-unit {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 12px;
    padding: 7px 10px;
    outline: none;
    cursor: pointer;
  }

  /* ── Task status / type pills ── */
  .pill-pendiente    { background: var(--nuevo-bg); color: #60a5fa; }
  .pill-completada   { background: rgba(34,197,94,0.15); color: #22c55e; }

  .pill-type-reporte { background: rgba(8,145,178,0.15); color: #38bdf8; font-weight: 500; }
  .pill-type-tarea   { background: rgba(168,85,247,0.15); color: #a855f7; font-weight: 500; }
  .pill-config       { background: rgba(168,85,247,0.15); color: #a855f7; }
  .pill-revisión     { background: rgba(20,184,166,0.15); color: #14b8a6; }
  .pill-investigación{ background: rgba(245,158,11,0.15); color: #f59e0b; }

  .status-btn-completada { background: #16a34a; color: #fff; }
  .status-btn-pendiente  { background: #2563eb; color: #fff; }

  /* ── Nueva tarea form ── */
  .new-task-panel {
    max-width: 560px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .new-task-panel h2 {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
  }

  .new-task-panel p {
    font-size: 12px;
    color: var(--text3);
    line-height: 1.6;
    margin-top: -8px;
  }

  .creating-indicator {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--text3);
  }

  .est-big {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 26px;
    font-weight: 500;
    color: var(--accent);
  }

  .est-real {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 26px;
    font-weight: 500;
    color: var(--text);
  }

  .delete-btn {
    padding: 5px 12px;
    border-radius: 5px;
    border: 1px solid rgba(255,107,107,0.25);
    background: none;
    color: var(--alta);
    font-size: 11px;
    font-family: 'IBM Plex Sans', sans-serif;
    cursor: pointer;
    opacity: 0.55;
    transition: all 0.15s;
  }
  .delete-btn:hover { opacity: 1; background: var(--alta-bg); border-color: rgba(255,107,107,0.5); }

  .res-time-badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 3px;
    background: rgba(77,184,130,0.12);
    color: var(--accent);
    margin-left: 4px;
  }

  /* ── Login modal ── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(9,20,19,0.85);
    backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
  }

  .modal-overlay.hidden { display: none; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 10px;
    padding: 32px;
    width: 340px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .modal-logo {
    display: flex; align-items: center; gap: 10px;
  }

  .modal-logo-icon {
    width: 32px; height: 32px;
    background: #285A48;
    border: 1px solid rgba(77,184,130,0.3);
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
  }

  .modal-logo-icon svg { width: 17px; height: 17px; fill: white; }

  .modal h2 {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
  }

  .modal p {
    font-size: 12px;
    color: var(--text2);
    margin-top: -12px;
  }

  .modal-field {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .modal-field input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 13px;
    padding: 9px 12px;
    outline: none;
    transition: border-color 0.15s;
  }

  .modal-field input::placeholder { color: var(--text3); }
  .modal-field input:focus { border-color: var(--accent); }

  .modal-submit {
    padding: 9px;
    border-radius: 6px;
    background: var(--accent);
    border: none;
    color: white;
    font-size: 13px;
    font-family: 'IBM Plex Sans', sans-serif;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.15s;
  }

  .modal-submit:hover { opacity: 0.85; }
  .modal-submit:disabled { opacity: 0.5; cursor: default; }

  .modal-error {
    font-size: 12px;
    color: #ff6b6b;
    display: none;
  }

  /* ── Sesión en sidebar ── */
  .session-info {
    margin-top: auto;
    padding: 10px 8px;
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .session-profile {
    display: flex;
    align-items: center;
    gap: 9px;
  }

  .session-avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    object-fit: cover;
    border: 1px solid var(--border2);
    flex-shrink: 0;
  }

  .session-avatar-placeholder {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: var(--surface2);
    border: 1px solid var(--border2);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    color: var(--text2);
    flex-shrink: 0;
  }

  .session-name {
    font-size: 12px;
    color: var(--text);
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .session-status {
    font-size: 10px;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .session-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--accent);
  }

  /* ── Cuentas widget ── */
  .accounts-bar {
    padding: 9px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    display: flex;
    align-items: center;
    gap: 8px;
    overflow-x: auto;
    flex-shrink: 0;
  }

  .accounts-bar::-webkit-scrollbar { height: 3px; }
  .accounts-bar::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .accounts-label {
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .account-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px 4px 5px;
    border-radius: 20px;
    border: 1px solid var(--border2);
    background: var(--surface);
    color: var(--text2);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    flex-shrink: 0;
    font-family: 'IBM Plex Sans', sans-serif;
  }

  .account-chip:hover { background: var(--surface2); color: var(--text); }
  .account-chip.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

  .account-avatar {
    width: 18px; height: 18px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 700;
    color: #fff;
    flex-shrink: 0;
  }

  .account-username {
    font-size: 10px;
    opacity: 0.65;
    font-family: 'IBM Plex Mono', monospace;
  }

  .add-account-btn {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px dashed var(--border2);
    background: none;
    color: var(--text3);
    font-size: 11px;
    font-family: 'IBM Plex Sans', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .add-account-btn:hover { border-color: var(--accent); color: var(--accent); }

  .account-select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text2);
    font-size: 11px;
    font-family: 'IBM Plex Sans', sans-serif;
    padding: 3px 8px;
    outline: none;
    cursor: pointer;
    transition: border-color 0.15s;
  }

  .account-select:focus { border-color: var(--accent); }

  /* ── Barra de acciones (debajo de stats) ── */
  .actions-bar {
    padding: 10px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    background: var(--surface);
  }

  .actions-sep {
    width: 1px;
    height: 20px;
    background: var(--border2);
    flex-shrink: 0;
  }

  /* ── Buscador de fecha ── */
  .date-filter {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .date-input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    padding: 5px 8px;
    outline: none;
    cursor: pointer;
    transition: border-color 0.15s;
    color-scheme: dark;
  }

  .date-input:focus { border-color: var(--accent); }

  .date-sep { font-size: 11px; color: var(--text3); }

  .completed-badge {
    font-size: 10px;
    font-family: 'IBM Plex Mono', monospace;
    padding: 2px 7px;
    border-radius: 3px;
    background: rgba(77,184,130,0.15);
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 4px;
  }

  /* ── Daily Standup ── */
  .standup-view {
    flex: 1;
    overflow-y: auto;
    padding: 28px 32px;
    display: none;
    flex-direction: column;
    gap: 24px;
  }

  .standup-view::-webkit-scrollbar { width: 4px; }
  .standup-view::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .standup-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }

  .standup-date {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    text-transform: capitalize;
  }

  .standup-day-btns { display: flex; gap: 6px; }

  .standup-day-btn {
    padding: 5px 14px;
    border-radius: 20px;
    border: 1px solid var(--border2);
    background: none;
    color: var(--text2);
    font-size: 12px;
    font-family: 'IBM Plex Sans', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
  }

  .standup-day-btn:hover { border-color: var(--accent); color: var(--accent); }
  .standup-day-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

  .standup-group-title {
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .standup-count {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 3px;
    background: var(--surface2);
    color: var(--text2);
  }

  .standup-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
  }

  .standup-row:last-child { border-bottom: none; }

  .standup-check { color: var(--accent); font-size: 13px; flex-shrink: 0; }

  .standup-row-title {
    font-size: 13px;
    color: var(--text);
    flex: 1;
    min-width: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .standup-row-meta { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }

  .standup-empty {
    text-align: center;
    color: var(--text3);
    font-size: 13px;
    padding: 48px 0;
  }

  .standup-total {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 10px;
    padding-top: 4px;
    border-top: 1px solid var(--border2);
    font-size: 12px;
    color: var(--text3);
  }

  .standup-total-val {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 22px;
    font-weight: 500;
    color: var(--accent);
  }
</style>
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar">
  <div>
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 16 16"><path d="M8 1L1 4v4c0 4 3 6.5 7 7.5 4-1 7-3.5 7-7.5V4L8 1z"/></svg>
      </div>
      <div>
        <div class="logo-text">reports</div>
        <div class="logo-sub">clave10</div>
      </div>
    </div>
  </div>

  <nav class="nav-section">
    <label>Mi avance</label>
    <button class="nav-item" id="nav-standup" onclick="showStandup()">
      <span class="nav-dot" style="background:#a855f7"></span>
      Daily Standup
    </button>
  </nav>

  <nav class="nav-section">
    <label>Bandeja</label>
    <button class="nav-item active" onclick="filterStatus(null, this)">
      <span class="nav-dot" style="background:var(--accent)"></span>
      Todos
      <span class="badge" id="badge-total">—</span>
    </button>
    <button class="nav-item" onclick="filterStatus('nuevo', this)">
      <span class="nav-dot" style="background:var(--nuevo)"></span>
      Nuevos
      <span class="badge" id="badge-nuevo">—</span>
    </button>
    <button class="nav-item" onclick="filterStatus('en_proceso', this)">
      <span class="nav-dot" style="background:var(--en_proceso)"></span>
      En proceso
      <span class="badge" id="badge-en_proceso">—</span>
    </button>
    <button class="nav-item" onclick="filterStatus('resuelto', this)">
      <span class="nav-dot" style="background:var(--resuelto)"></span>
      Resueltos
      <span class="badge" id="badge-resuelto">—</span>
    </button>
    <button class="nav-item" onclick="filterStatus('visto', this)">
      <span class="nav-dot" style="background:var(--visto)"></span>
      Vistos
      <span class="badge" id="badge-visto">—</span>
    </button>
    <button class="nav-item" onclick="filterStatus('en_revision', this)">
      <span class="nav-dot" style="background:var(--en_revision)"></span>
      En revisión
      <span class="badge" id="badge-en_revision">—</span>
    </button>
  </nav>

  <div class="session-info" id="session-info" style="display:none">
    <div class="session-profile">
      <div id="session-avatar-wrap"></div>
      <div>
        <div class="session-name" id="session-user-label">—</div>
        <div class="session-status"><span class="session-dot"></span>Conectado</div>
      </div>
    </div>
    <button class="sync-btn" style="margin-top:0" onclick="logout()">Cerrar sesión</button>
  </div>

  <button class="sync-btn" onclick="syncNow()">
    <svg id="sync-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
    Sincronizar
  </button>
</aside>

<!-- Main -->
<main class="main">
  <div class="topbar">
    <h1 id="topbar-title">Todos los reportes</h1>
  </div>

  <!-- Cuentas en producción -->
  <div class="accounts-bar" id="accounts-bar">
    <span class="accounts-label">Producción</span>
    <div id="account-chips" style="display:flex;gap:6px;align-items:center;flex:1"></div>
    <button class="add-account-btn" onclick="showNewAccountForm()">+ Cuenta</button>
  </div>

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat-cell">
      <div class="stat-label">Total</div>
      <div class="stat-value accent" id="stat-total">—</div>
    </div>
    <div class="stat-cell">
      <div class="stat-label" id="stat-label-nuevos">Nuevos</div>
      <div class="stat-value" id="stat-nuevos">—</div>
    </div>
    <div class="stat-cell">
      <div class="stat-label" id="stat-label-proceso">En proceso</div>
      <div class="stat-value" id="stat-proceso">—</div>
    </div>
    <div class="stat-cell">
      <div class="stat-label" id="stat-label-resueltos">Resueltos</div>
      <div class="stat-value" id="stat-resueltos">—</div>
    </div>
  </div>

  <!-- Acciones -->
  <div class="actions-bar">
    <div class="date-filter">
      <span class="date-sep" style="font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--text3)">Fecha</span>
      <input type="date" id="date-from" class="date-input" title="Desde" onchange="applyDateFilter()">
      <span class="date-sep">—</span>
      <input type="date" id="date-to" class="date-input" title="Hasta" onchange="applyDateFilter()">
      <button class="filter-chip" id="date-clear-btn" onclick="clearDateFilter()" style="display:none">✕</button>
    </div>
    <div class="actions-sep"></div>
    <button class="notify-btn" onclick="showNewTaskForm()">+ Nueva tarea</button>
  </div>

  <div class="content">
    <!-- Lista -->
    <div class="report-list">
      <div class="list-header">
        <span id="list-count">cargando...</span>
        <span id="list-filter-label"></span>
      </div>
      <div id="report-items"></div>
    </div>

    <!-- Detalle -->
    <div class="detail-panel" id="detail-panel">
      <div class="empty-state">
        <div class="empty-icon">⌗</div>
        <p>Selecciona un reporte para ver el detalle</p>
      </div>
    </div>
  </div>

  <!-- Daily Standup -->
  <div class="standup-view" id="standup-view"></div>
</main>

<!-- Modal de login -->
<div class="modal-overlay hidden" id="login-modal">
  <div class="modal">
    <div class="modal-logo">
      <div class="modal-logo-icon">
        <svg viewBox="0 0 16 16"><path d="M8 1L1 4v4c0 4 3 6.5 7 7.5 4-1 7-3.5 7-7.5V4L8 1z"/></svg>
      </div>
      <div>
        <div class="logo-text">reports · clave10</div>
        <div class="logo-sub">linkaform</div>
      </div>
    </div>

    <div>
      <h2>Iniciar sesión</h2>
      <p>Ingresa tus credenciales de Linkaform</p>
    </div>

    <div class="modal-field">
      <input type="text" id="lf-username" placeholder="Usuario o correo" autocomplete="username" />
      <input type="password" id="lf-password" placeholder="Contraseña" autocomplete="current-password" />
    </div>

    <div class="modal-error" id="login-error"></div>

    <button class="modal-submit" id="login-submit" onclick="doLogin()">Entrar</button>
  </div>
</div>

<script>
let allItems = [];
let allReports = [];
let allTasks = [];
let allAccounts = [];
let selectedId = null;
let selectedTaskId = null;
let selectedAccountId = null;
let currentStatusFilter = null;
let dateFrom = null;
let dateTo = null;
let accountFilter = null;

const API = '';

async function loadStats() {
  try {
    const [repRes, taskRes] = await Promise.all([
      fetch(`${API}/api/stats`),
      fetch(`${API}/api/tasks/stats`)
    ]);
    const s = await repRes.json();
    const t = await taskRes.json();

    document.getElementById('badge-total').textContent    = (s.total - s.resueltos) + (t.total - t.completadas);
    document.getElementById('badge-nuevo').textContent    = (s.nuevos || 0) + (t.pendientes || 0);
    document.getElementById('badge-en_proceso').textContent = (s.en_proceso || 0) + (t.en_proceso || 0);
    document.getElementById('badge-resuelto').textContent = (s.resueltos || 0) + (t.completadas || 0);
    document.getElementById('badge-visto').textContent    = s.vistos || 0;
    document.getElementById('badge-en_revision').textContent = s.en_revision || 0;

    document.getElementById('stat-total').textContent    = (s.total || 0) + (t.total || 0);
    document.getElementById('stat-nuevos').textContent   = (s.nuevos || 0) + (t.pendientes || 0);
    document.getElementById('stat-proceso').textContent  = (s.en_proceso || 0) + (t.en_proceso || 0);
    document.getElementById('stat-resueltos').textContent = (s.resueltos || 0) + (t.completadas || 0);
  } catch(e) {}
}

async function loadItems() {
  try {
    const [repRes, taskRes] = await Promise.all([
      fetch(`${API}/api/reports?limit=200`),
      fetch(`${API}/api/tasks`)
    ]);
    const reports = (await repRes.json()).map(r => ({ ...r, item_type: 'reporte' }));
    const tasks   = (await taskRes.json()).map(t => ({ ...t, item_type: 'tarea'   }));

    allReports = reports;
    allTasks   = tasks;

    let fr, ft;
    if (!currentStatusFilter) {
      fr = reports.filter(r => r.status !== 'resuelto');
      ft = tasks.filter(t => t.status !== 'completada');
    } else if (currentStatusFilter === 'resuelto') {
      fr = reports.filter(r => r.status === 'resuelto');
      ft = tasks.filter(t => t.status === 'completada');
    } else if (currentStatusFilter === 'nuevo') {
      fr = reports.filter(r => r.status === 'nuevo');
      ft = tasks.filter(t => t.status === 'pendiente');
    } else {
      fr = reports.filter(r => r.status === currentStatusFilter);
      ft = currentStatusFilter === 'en_proceso' ? tasks.filter(t => t.status === 'en_proceso') : [];
    }

    allItems = [...fr, ...ft].sort((a, b) => (b.created_at || 0) - (a.created_at || 0));
  } catch(e) {
    allItems = []; allReports = []; allTasks = [];
  }
  renderList();
  renderStandup();
}

function renderList() {
  const container = document.getElementById('report-items');

  let displayItems = allItems;
  if (dateFrom || dateTo) {
    const fromTs = dateFrom ? new Date(dateFrom + 'T00:00:00').getTime() / 1000 : 0;
    const toTs   = dateTo   ? new Date(dateTo   + 'T23:59:59').getTime() / 1000 : Infinity;
    displayItems = displayItems.filter(item => {
      const ts = item.created_at || 0;
      return ts >= fromTs && ts <= toTs;
    });
  }
  if (accountFilter) {
    displayItems = displayItems.filter(item => item.account_id === accountFilter);
  }

  const nr = displayItems.filter(i => i.item_type === 'reporte').length;
  const nt = displayItems.filter(i => i.item_type === 'tarea').length;
  const parts = [];
  if (nr) parts.push(`${nr} reporte${nr !== 1 ? 's' : ''}`);
  if (nt) parts.push(`${nt} tarea${nt !== 1 ? 's' : ''}`);
  document.getElementById('list-count').textContent = parts.join(' · ') || 'Sin elementos';

  if (!displayItems.length) {
    container.innerHTML = '<div class="no-reports">Sin elementos con estos filtros</div>';
    return;
  }

  container.innerHTML = displayItems.map(item => {
    const isReport = item.item_type === 'reporte';
    const id = item.id;
    const isSelected = isReport ? id === selectedId : id === selectedTaskId;
    const date = item.created_at ? new Date(item.created_at * 1000) : null;
    const timeStr = date ? formatTime(date) : '';

    if (isReport) {
      const isNew = item.status === 'nuevo';
      const resMin = item.resolution_time_minutes;
      const resLabel = (item.status === 'resuelto' && resMin)
        ? `<span class="res-time-badge">⏱ ${fmtResTime(resMin)}</span>` : '';
      const completedStr = item.completed_at
        ? new Date(item.completed_at * 1000).toLocaleDateString('es-MX', { day:'2-digit', month:'short', year:'numeric' })
        : '';
      const completedLabel = completedStr
        ? `<span style="font-size:10px;color:var(--accent);font-family:'IBM Plex Mono',monospace;margin-left:4px">✓ ${completedStr}</span>` : '';
      return `
        <div class="report-card ${isSelected ? 'selected' : ''}" onclick="selectReport('${id}')">
          <div class="report-card-header">
            <span class="pill pill-type-reporte">reporte</span>
            <span class="pill pill-${item.status}">${item.status || 'nuevo'}</span>
            <span class="report-card-time">${timeStr}</span>
          </div>
          <div class="report-card-summary">${escHtml(item.summary || item.raw_message?.substring(0, 100) || '')}</div>
          <div class="report-card-user">@${escHtml(item.slack_user_name || item.slack_user || '?')} · #${escHtml(item.slack_channel || '')}${resLabel}${completedLabel}</div>
          ${isNew ? '<div class="unread-dot"></div>' : ''}
        </div>`;
    } else {
      const est = item.estimated_minutes ? `<span class="res-time-badge">~${fmtResTime(item.estimated_minutes)}</span>` : '';
      const completedStr = item.completed_at
        ? new Date(item.completed_at * 1000).toLocaleDateString('es-MX', { day:'2-digit', month:'short', year:'numeric' })
        : '';
      const completedLabel = completedStr
        ? `<span style="font-size:10px;color:var(--accent);font-family:'IBM Plex Mono',monospace;margin-left:4px">✓ ${completedStr}</span>` : '';
      return `
        <div class="report-card ${isSelected ? 'selected' : ''}" onclick="selectTask('${id}')">
          <div class="report-card-header">
            <span class="pill pill-type-tarea">tarea</span>
            <span class="pill pill-${item.status || 'pendiente'}">${item.status || 'pendiente'}</span>
            <span class="report-card-time">${timeStr}</span>
          </div>
          <div class="report-card-summary">${escHtml(item.title || '')}</div>
          <div class="report-card-user">${est}${completedLabel} <span style="opacity:0.7">${escHtml((item.description || '').substring(0, 55))}${(item.description || '').length > 55 ? '…' : ''}</span></div>
        </div>`;
    }
  }).join('');
}

async function selectReport(id) {
  selectedId = id;
  selectedTaskId = null;
  renderList();

  const report = allReports.find(r => r.id === id);
  if (!report) return;

  const panel = document.getElementById('detail-panel');
  const date = report.created_at ? new Date(report.created_at * 1000).toLocaleString('es-MX') : '';
  const completedDate = report.completed_at ? new Date(report.completed_at * 1000).toLocaleString('es-MX') : '';

  // Pre-cálculo para el formulario de resolución
  const _resTime = report.resolution_time_minutes;
  let _resVal = '', _resUnit = 60;
  if (_resTime) {
    if (_resTime >= 60) { _resVal = (_resTime % 60 === 0) ? String(_resTime / 60) : (_resTime / 60).toFixed(1); }
    else { _resVal = String(_resTime); _resUnit = 1; }
  }
  const _showRes = report.status === 'resuelto' || !!report.resolution_cause || !!_resTime;

  panel.innerHTML = `
    <div class="detail-header">
      <div class="detail-title">${escHtml(report.summary || 'Sin título')}</div>
    </div>

    <div class="detail-meta">
      <span class="pill pill-${report.status}">${report.status || 'nuevo'}</span>
      <span class="ts-label" title="Fecha de creación del hilo">📅 ${date}</span>
      ${completedDate ? `<span class="completed-badge" title="Fecha de resolución">✓ resuelto ${completedDate}</span>` : ''}
      <select class="account-select" onchange="assignAccount('${id}','report',this.value)" title="Cuenta asociada">
        <option value="">Sin cuenta</option>
        ${allAccounts.map(a => `<option value="${a.id}" ${report.account_id === a.id ? 'selected' : ''}>${escHtml(a.name)}</option>`).join('')}
      </select>
    </div>

    <div class="section">
      <div class="section-title">Mensaje · @${escHtml(report.slack_user_name || report.slack_user || '?')}</div>
      <div class="section-body">
        <div class="raw-msg">${escHtml(report.raw_message || '')}</div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Estado</div>
      <div class="section-body" style="display:flex;flex-direction:column;gap:12px">
        <div class="status-actions">
          ${['nuevo','visto','en_revision','en_proceso'].map(s => {
            const isCurrent = report.status === s;
            const notifyIcon = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>`;
            const notifyBtn = s !== 'nuevo'
              ? `<button class="status-notify status-btn-${s}" onclick="notifySlack('${id}','${s}')" title="Notificar en Slack">${notifyIcon}</button>`
              : '';
            return `
              <div class="status-btn-group ${isCurrent ? 'current' : ''}">
                <button class="status-btn status-btn-${s}" onclick="updateStatus('${id}','${s}')">${s.replace(/_/g,' ')}</button>
                ${notifyBtn}
              </div>`;
          }).join('')}
          <div class="status-btn-group ${report.status === 'resuelto' ? 'current' : ''}">
            <button class="status-btn status-btn-resuelto" onclick="toggleResolutionForm()">resuelto</button>

function renderLfFields(obj, prefix = '') {
  const ignore = ['answers'];
  return Object.entries(obj)
    .filter(([k]) => !ignore.includes(k) && typeof obj[k] !== 'object')
    .slice(0, 12)
    .map(([k, v]) => `
      <div class="lf-field">
        <span class="lf-label">${escHtml(k)}</span>
        <span class="lf-value">${escHtml(String(v).substring(0, 80))}</span>
      </div>
    `).join('');
}

async function updateStatus(id, status) {

    method: 'PATCH',

    body: JSON.stringify({ status })

async function notifySlack(id, status) {
  const btn = event.currentTarget;
  const original = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = '···';

  try {
    const res = await fetch(`${API}/api/reports/${encodeURIComponent(id)}/notify`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status }),
    });
    const data = await res.json();
    btn.innerHTML = data.ok ? '✓' : '✗';
    setTimeout(() => { btn.innerHTML = original; btn.disabled = false; }, 2000);
  } catch(e) {
    btn.innerHTML = '✗';
    setTimeout(() => { btn.innerHTML = original; btn.disabled = false; }, 2000);
  }
}

async function saveNotes(id) {
  const notes = document.getElementById('notes-area')?.value || '';
  await fetch(`${API}/api/reports/${encodeURIComponent(id)}/notes`, {
    method: 'PATCH',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ notes })
  });
  const r = allReports.find(r => r.id === id);
  if (r) r.notes = notes;
  const btn = document.querySelector('.save-btn');
  if (btn) { btn.textContent = '✓ Guardado'; setTimeout(() => btn.textContent = 'Guardar notas', 1500); }
}

async function loadThread(id) {
  const report = allReports.find(r => r.id === id);
  if (!report) return;

  if (report._thread !== undefined) {
    renderThread(report._thread);
    return;
  }

  try {
    const res = await fetch(`${API}/api/reports/${encodeURIComponent(id)}/thread`);
    const data = await res.json();
    report._thread = data.messages || [];
    renderThread(report._thread);
  } catch(e) {
    const body = document.getElementById('thread-body');
    if (body) body.innerHTML = '<div style="color:var(--text3);font-size:12px">Error al cargar el hilo</div>';
  }
}

function renderThread(messages) {
  const body = document.getElementById('thread-body');
  const countEl = document.getElementById('thread-count');
  if (!body) return;

  if (countEl) countEl.textContent = messages.length
    ? `${messages.length} respuesta${messages.length !== 1 ? 's' : ''}`
    : '';

  if (!messages.length) {
    body.innerHTML = '<div style="color:var(--text3);font-size:12px">Sin respuestas en el hilo</div>';
    return;
  }

  body.innerHTML = messages.map((msg, i) => {
    const name = escHtml(msg.user_name || msg.user || '?');
    const initial = name.charAt(0).toUpperCase();
    const text = escHtml(msg.text || '');
    const ts = msg.ts
      ? new Date(parseFloat(msg.ts) * 1000).toLocaleString('es-MX', { hour: '2-digit', minute: '2-digit', day: '2-digit', month: 'short' })
      : '';
    const isLast = i === messages.length - 1;
    return `
      <div style="display:flex;flex-direction:column;gap:5px;padding:10px 0;${!isLast ? 'border-bottom:1px solid var(--border)' : ''}">
        <div style="display:flex;align-items:center;gap:8px">
          <div style="width:22px;height:22px;border-radius:50%;background:var(--surface2);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--text2);flex-shrink:0">${initial}</div>
          <span style="font-size:12px;color:var(--text);font-weight:500">${name}</span>
          <span style="font-size:10px;color:var(--text3);font-family:'IBM Plex Mono',monospace;margin-left:auto">${ts}</span>
        </div>
        <div class="raw-msg" style="padding-left:30px;font-size:12px">${text}</div>
      </div>`;
  }).join('');
}

async function submitNewTask() {
  const desc = document.getElementById('new-task-desc')?.value.trim();
  if (!desc) return;
  const btn = document.getElementById('create-task-btn');
  const statusEl = document.getElementById('create-task-status');
  btn.disabled = true;
  btn.textContent = 'Creando...';
  if (statusEl) statusEl.style.display = 'flex';
  try {
    const res = await fetch(`${API}/api/tasks`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ description: desc }),
    });
    const task = await res.json();
    if (task.error) throw new Error(task.error);
    const taskItem = { ...task, item_type: 'tarea' };
    allItems.unshift(taskItem);
    allTasks.unshift(taskItem);
    renderList();
    selectTask(task.id);
    loadStats();
  } catch(e) {
    if (statusEl) { statusEl.style.display = 'none'; }
    btn.disabled = false;
    btn.textContent = 'Crear tarea';
  }
}

async function completeTask(id) {
  const timeVal = parseFloat(document.getElementById('task-time-value').value) || 0;
  const timeUnit = parseInt(document.getElementById('task-time-unit').value);
  const notes = document.getElementById('task-res-notes').value;

    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ actual_time_minutes: timeMinutes, resolution_notes: notes }),
  });
  const nowTs = Math.floor(Date.now() / 1000);
  const t = allTasks.find(t => t.id === id);
  if (t) { t.status = 'completada'; t.actual_time_minutes = timeMinutes; t.resolution_notes = notes; t.completed_at = nowTs; const item = allItems.find(i => i.id === id); if (item) { item.status = 'completada'; item.actual_time_minutes = timeMinutes; item.completed_at = nowTs; } }
  selectTask(id);
  renderList();
  loadStats();
}

async function saveResolution(id) {

function fmtResTime(minutes) {
  if (!minutes) return '';
  if (minutes >= 60) {
    const h = minutes / 60;
    return (minutes % 60 === 0 ? h : h.toFixed(1)) + 'h';
  }
  return minutes + 'min';
}

async function syncNow() {
  const icon = document.getElementById('sync-icon');
  const btn  = document.querySelector('.sync-btn');

  // Evitar doble click
  if (btn.disabled) return;
  btn.disabled = true;
  icon.classList.add('spinning');

  try {
    const res = await fetch(`${API}/api/sync`, { method: 'POST' });
    if (res.status === 409) {
      // Ya hay un sync en curso, solo esperar
    } else if (!res.ok) {
      throw new Error('Error al iniciar sync');
    }

    // Polling hasta que termine
    await waitForSync();
    await loadStats();
    await loadItems();
  } catch(e) {
    console.error('Sync error:', e);
  } finally {
    icon.classList.remove('spinning');
    btn.disabled = false;
  }
}

async function waitForSync() {
  while (true) {
    await new Promise(r => setTimeout(r, 1500));
    try {
      const res = await fetch(`${API}/api/sync/status`);
      const { running } = await res.json();
      if (!running) break;
    } catch(e) { break; }
  }
}

function formatTime(date) {
  const now = new Date();
  const diff = (now - date) / 1000;
  if (diff < 60) return 'ahora';
  if (diff < 3600) return `${Math.floor(diff/60)}m`;
  if (diff < 86400) return `${Math.floor(diff/3600)}h`;
  return `${Math.floor(diff/86400)}d`;
}

function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

const ACCOUNT_COLORS = ['#4db882','#60a5fa','#f59e0b','#a855f7','#ef4444','#14b8a6','#f97316','#06b6d4'];

function accountColor(id) {
  let h = 0;
  for (let i = 0; i < id.length; i++) h = (h * 31 + id.charCodeAt(i)) & 0xffffffff;
  return ACCOUNT_COLORS[Math.abs(h) % ACCOUNT_COLORS.length];
}

}

  selectedId = null;
  selectedTaskId = null;
  renderList();

  const acc = allAccounts.find(a => a.id === id);
  if (!acc) return;

  const color     = accountColor(acc.id);
  const initial   = (acc.name || '?').charAt(0).toUpperCase();
  const repCount  = allReports.filter(r => r.account_id === id).length;
  const taskCount = allTasks.filter(t => t.account_id === id).length;
  const since     = acc.created_at ? new Date(acc.created_at * 1000).toLocaleDateString('es-MX', { day:'2-digit', month:'short', year:'numeric' }) : '';

  document.getElementById('detail-panel').innerHTML = `
    <div class="detail-header">
      <div style="display:flex;align-items:center;gap:12px;flex:1">
        <div style="width:40px;height:40px;border-radius:50%;background:${color};display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#fff;flex-shrink:0">${initial}</div>
        <div>
          <div class="detail-title" style="font-size:18px">${escHtml(acc.name)}</div>
          ${acc.username ? `<div style="font-size:12px;color:var(--text3);font-family:'IBM Plex Mono',monospace">${escHtml(acc.username)}</div>` : ''}
        </div>
      </div>
      <button class="delete-btn" onclick="archiveAccount('${id}')">Archivar</button>
    </div>

    <div class="detail-meta">
      <span class="pill" style="background:rgba(77,184,130,0.15);color:var(--accent)">activa</span>
      ${since ? `<span class="ts-label">desde ${since}</span>` : ''}
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);border-radius:8px;overflow:hidden;border:1px solid var(--border)">
      <div style="background:var(--surface);padding:14px 18px">
        <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px">Reportes</div>
        <div style="font-family:'IBM Plex Mono',monospace;font-size:26px;font-weight:500;color:var(--text)">${repCount}</div>
      </div>
      <div style="background:var(--surface);padding:14px 18px">
        <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px">Tareas</div>
        <div style="font-family:'IBM Plex Mono',monospace;font-size:26px;font-weight:500;color:var(--text)">${taskCount}</div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Editar cuenta</div>
      <div class="section-body" style="display:flex;flex-direction:column;gap:10px">
        <div style="display:flex;flex-direction:column;gap:4px">
          <label style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em">Nombre</label>
          <input type="text" id="acc-edit-name" class="notes-area" style="min-height:unset;padding:8px 10px;resize:none" value="${escHtml(acc.name)}">
        </div>
        <div style="display:flex;flex-direction:column;gap:4px">
          <label style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em">Usuario</label>
          <input type="text" id="acc-edit-user" class="notes-area" style="min-height:unset;padding:8px 10px;resize:none" value="${escHtml(acc.username || '')}">
        </div>
        <div style="display:flex;flex-direction:column;gap:4px">
          <label style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em">Notas</label>
          <textarea id="acc-edit-notes" class="notes-area" style="min-height:70px">${escHtml(acc.notes || '')}</textarea>
        </div>
        <div><button class="save-btn" onclick="saveAccountEdits('${id}')">Guardar cambios</button></div>
      </div>
    </div>`;
}

function showNewAccountForm() {
  selectedId = null;
  selectedTaskId = null;
  accountFilter = null;
  selectedAccountId = null;
  renderAccountsBar();
  renderList();

  document.getElementById('detail-panel').innerHTML = `
    <div class="new-task-panel">
      <h2>Nueva cuenta en producción</h2>
      <p>Registra una cuenta activa del proyecto para tenerla visible en el centro de mando.</p>
      <div style="display:flex;flex-direction:column;gap:10px">
        <div style="display:flex;flex-direction:column;gap:4px">
          <label style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em">Nombre del cliente *</label>
          <input type="text" id="new-acc-name" class="notes-area" style="min-height:unset;padding:8px 10px;resize:none" placeholder="Ej: Empresa ABC">
        </div>
        <div style="display:flex;flex-direction:column;gap:4px">
          <label style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em">Usuario en el sistema</label>
          <input type="text" id="new-acc-user" class="notes-area" style="min-height:unset;padding:8px 10px;resize:none" placeholder="Ej: empresa_abc">
        </div>
        <div style="display:flex;flex-direction:column;gap:4px">
          <label style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em">Notas</label>
          <textarea id="new-acc-notes" class="notes-area" style="min-height:70px" placeholder="Módulos activos, observaciones..."></textarea>
        </div>
      </div>
      <div><button class="save-btn" id="new-acc-btn" onclick="createAccount()">Agregar cuenta</button></div>
    </div>`;
  document.getElementById('new-acc-name').focus();
}

async function createAccount() {
  const name  = document.getElementById('new-acc-name')?.value.trim();
  const uname = document.getElementById('new-acc-user')?.value.trim();
  const notes = document.getElementById('new-acc-notes')?.value.trim();
  if (!name) { document.getElementById('new-acc-name').focus(); return; }

  const btn = document.getElementById('new-acc-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Guardando...'; }

  try {
    const res  = await fetch(`${API}/api/accounts`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, username: uname, notes }),
    });
    const acc = await res.json();
    if (acc.error) throw new Error(acc.error);
    allAccounts.push(acc);
    renderAccountsBar();
    toggleAccountFilter(acc.id);
  } catch(e) {
    if (btn) { btn.disabled = false; btn.textContent = 'Agregar cuenta'; }
  }
}

async function saveAccountEdits(id) {
  const name  = document.getElementById('acc-edit-name')?.value.trim();
  const uname = document.getElementById('acc-edit-user')?.value.trim();
  const notes = document.getElementById('acc-edit-notes')?.value || '';
  if (!name) return;

  const btn = document.querySelector('#detail-panel .save-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Guardando...'; }

  const res = await fetch(`${API}/api/accounts/${encodeURIComponent(id)}`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, username: uname, notes }),
  });
  const updated = await res.json();
  const idx = allAccounts.findIndex(a => a.id === id);
  if (idx >= 0) allAccounts[idx] = updated;
  renderAccountsBar();
  showAccountDetail(id);
}

async function archiveAccount(id) {
  if (!confirm('¿Archivar esta cuenta? Ya no aparecerá en el widget.')) return;
  await fetch(`${API}/api/accounts/${encodeURIComponent(id)}`, { method: 'DELETE' });
  allAccounts = allAccounts.filter(a => a.id !== id);
  if (accountFilter === id) { accountFilter = null; }
  renderAccountsBar();
  renderList();
  document.getElementById('detail-panel').innerHTML = `
    <div class="empty-state"><div class="empty-icon">⌗</div><p>Cuenta archivada</p></div>`;
}

async function assignAccount(itemId, type, accountId) {
  const endpoint = type === 'report'
    ? `/api/reports/${encodeURIComponent(itemId)}/account`
    : `/api/tasks/${encodeURIComponent(itemId)}/account`;
  await fetch(`${API}${endpoint}`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ account_id: accountId || null }),
  });
  const collection = type === 'report' ? allReports : allTasks;
  const item = collection.find(i => i.id === itemId);
  if (item) item.account_id = accountId || null;
  const listItem = allItems.find(i => i.id === itemId);
  if (listItem) listItem.account_id = accountId || null;
}

// ── Auth ──────────────────────────────────────────────────────────────────────

async function checkAuth() {
  try {
    const res  = await fetch(`${API}/api/auth/status`);
    const data = await res.json();
    if (data.logged_in) {
      showApp(data.user, data.avatar);
    } else {
      showLogin();
    }
  } catch(e) {
    showLogin();
  }
}

function showLogin() {
  document.getElementById('login-modal').classList.remove('hidden');
  document.getElementById('lf-username').focus();
}

function showApp(user, avatar) {
  document.getElementById('login-modal').classList.add('hidden');
  document.getElementById('session-info').style.display = 'flex';
  document.getElementById('session-user-label').textContent = user || '—';

  const wrap = document.getElementById('session-avatar-wrap');
  const initials = (user || '?').charAt(0).toUpperCase();
  if (avatar) {
    wrap.innerHTML = `<img class="session-avatar" src="${avatar}" alt="${escHtml(user)}"
      onerror="this.parentElement.innerHTML='<div class=\\'session-avatar-placeholder\\'>${initials}</div>'">`;
  } else {
    wrap.innerHTML = `<div class="session-avatar-placeholder">${initials}</div>`;
  }

  loadAccounts();
  loadStats();
  loadItems();
  setInterval(() => { loadStats(); loadItems(); }, 60000);
}

async function doLogin() {
  const username = document.getElementById('lf-username').value.trim();
  const password = document.getElementById('lf-password').value.trim();
  const errEl    = document.getElementById('login-error');
  const btn      = document.getElementById('login-submit');

  errEl.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'Entrando...';

  try {
    const res  = await fetch(`${API}/api/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
    });
    const data = await res.json();

    if (data.ok) {
      showApp(data.user, data.avatar);
    } else {
      errEl.textContent = data.error || 'Error al iniciar sesión';
      errEl.style.display = 'block';
    }
  } catch(e) {
    errEl.textContent = 'Error de conexión';
    errEl.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Entrar';
  }
}

async function logout() {
  await fetch(`${API}/api/auth/logout`, { method: 'POST' });
  document.getElementById('session-info').style.display = 'none';
  showLogin();
}

// ── Filtro de fecha ───────────────────────────────────────────────────────────

function applyDateFilter() {
  dateFrom = document.getElementById('date-from')?.value || null;
  dateTo   = document.getElementById('date-to')?.value   || null;
  const clearBtn = document.getElementById('date-clear-btn');
  if (clearBtn) clearBtn.style.display = (dateFrom || dateTo) ? 'inline-flex' : 'none';
  renderList();
}

function clearDateFilter() {
  dateFrom = null;
  dateTo   = null;
  const fromEl = document.getElementById('date-from');
  const toEl   = document.getElementById('date-to');
  if (fromEl) fromEl.value = '';
  if (toEl)   toEl.value   = '';
  const clearBtn = document.getElementById('date-clear-btn');
  if (clearBtn) clearBtn.style.display = 'none';
  renderList();
}

// Enter en los inputs del login
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !document.getElementById('login-modal').classList.contains('hidden')) {
    doLogin();
  }
});

// ── Daily Standup ─────────────────────────────────────────────────────────────

let standupDay = 'today';

function showStandup(day) {
  if (day) standupDay = day;
  document.querySelectorAll('.sidebar .nav-item').forEach(b => b.classList.remove('active'));
  document.getElementById('nav-standup').classList.add('active');
  document.querySelector('.content').style.display = 'none';
  document.getElementById('standup-view').style.display = 'flex';
  document.getElementById('topbar-title').textContent = 'Daily Standup';
  renderStandup();
}

function renderStandup() {
  const view = document.getElementById('standup-view');
  if (!view || view.style.display === 'none') return;

  const now = new Date();
  const target = new Date(now);
  if (standupDay === 'yesterday') target.setDate(target.getDate() - 1);

  const startTs = new Date(target.getFullYear(), target.getMonth(), target.getDate(), 0, 0, 0).getTime() / 1000;
  const endTs   = new Date(target.getFullYear(), target.getMonth(), target.getDate(), 23, 59, 59).getTime() / 1000;

  const dateLabel = target.toLocaleDateString('es-MX', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

  const doneTasks   = allTasks.filter(t =>
    t.status === 'completada' && t.completed_at >= startTs && t.completed_at <= endTs
  );
  const doneReports = allReports.filter(r =>
    r.status === 'resuelto' && r.completed_at >= startTs && r.completed_at <= endTs
  );

  const totalMinutes = [
    ...doneTasks.map(t => t.actual_time_minutes || 0),
    ...doneReports.map(r => r.resolution_time_minutes || 0)
  ].reduce((a, b) => a + b, 0);

  const isEmpty = !doneTasks.length && !doneReports.length;

  view.innerHTML = `
    <div class="standup-header">
      <div class="standup-date">${dateLabel}</div>
      <div class="standup-day-btns">
        <button class="standup-day-btn ${standupDay === 'today' ? 'active' : ''}" onclick="showStandup('today')">Hoy</button>
        <button class="standup-day-btn ${standupDay === 'yesterday' ? 'active' : ''}" onclick="showStandup('yesterday')">Ayer</button>
      </div>
    </div>

    ${isEmpty ? `<div class="standup-empty">Sin actividad completada este día</div>` : ''}

    ${doneTasks.length ? `
      <div>
        <div class="standup-group-title">
          Tareas completadas
          <span class="standup-count">${doneTasks.length}</span>
        </div>
        <div class="section">
          ${doneTasks.map(t => `
            <div class="standup-row">
              <span class="standup-check">✓</span>
              <span class="standup-row-title" title="${escHtml(t.title || '')}">${escHtml(t.title || t.description || '')}</span>
              <div class="standup-row-meta">
                <span class="pill pill-${t.task_type || 'tarea'}">${t.task_type || 'tarea'}</span>
                ${t.actual_time_minutes ? `<span class="res-time-badge">${fmtResTime(t.actual_time_minutes)}</span>` : ''}
              </div>
            </div>`).join('')}
        </div>
      </div>` : ''}

    ${doneReports.length ? `
      <div>
        <div class="standup-group-title">
          Reportes resueltos
          <span class="standup-count">${doneReports.length}</span>
        </div>
        <div class="section">
          ${doneReports.map(r => `
            <div class="standup-row">
              <span class="standup-check">✓</span>
              <span class="standup-row-title" title="${escHtml(r.summary || '')}">${escHtml(r.summary || r.raw_message?.substring(0, 90) || '')}</span>
              <div class="standup-row-meta">
                <span class="pill pill-type-reporte">reporte</span>
                ${r.resolution_time_minutes ? `<span class="res-time-badge">${fmtResTime(r.resolution_time_minutes)}</span>` : ''}
              </div>
            </div>`).join('')}
        </div>
      </div>` : ''}

    ${totalMinutes ? `
      <div class="standup-total">
        <span>Tiempo total invertido</span>
        <span class="standup-total-val">${fmtResTime(totalMinutes)}</span>
      </div>` : ''}
  `;
}

// ── End Daily Standup ──────────────────────────────────────────────────────────

// Init
checkAuth();
</script>
